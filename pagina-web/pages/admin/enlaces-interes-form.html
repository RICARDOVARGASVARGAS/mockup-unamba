<!-- pages/admin/enlaces-interes-form.html -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../assets/img/facultad/logo_universidad.ico" />
    <title>Editar enlace de interés — Panel de Administración | Facultad de Administración UNAMBA (Mockup)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <admin-sidebar></admin-sidebar>

    <div class="admin-canvas flex min-h-screen flex-col lg:pl-72">
      <admin-topbar page-title="Enlaces de interés"></admin-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-3xl">
          <a href="enlaces-interes.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-text-muted transition hover:text-text">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            Volver a Enlaces de interés
          </a>
          <h2 class="mt-2 font-heading text-xl font-bold text-text">Editar enlace de interés</h2>

          <form data-admin-form data-redirect="enlaces-interes.html" class="mt-6 space-y-6">
            <!-- Información general -->
            <div class="admin-card p-5 sm:p-6">
              <h3 class="font-heading text-base font-semibold text-text">Información general</h3>
              <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-[1fr_140px]">
                <div>
                  <label for="enlace-nombre" class="block text-sm font-medium text-text">Nombre</label>
                  <input id="enlace-nombre" type="text" value="SUNEDU" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
                <div>
                  <label for="enlace-orden" class="block text-sm font-medium text-text">Orden</label>
                  <input id="enlace-orden" type="number" min="1" value="1" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
              </div>
              <div class="mt-4">
                <label for="enlace-url" class="block text-sm font-medium text-text">URL</label>
                <input id="enlace-url" type="url" placeholder="https://..." class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                <p class="mt-1.5 text-xs text-text-muted">Enlace oficial del organismo. Vacío mientras se confirma con la facultad.</p>
              </div>
            </div>

            <!-- Logo -->
            <div class="admin-card p-5 sm:p-6" data-upload>
              <h3 class="font-heading text-base font-semibold text-text">Logo <span class="font-normal text-text-muted">(opcional)</span></h3>
              <div class="mt-4 flex items-center gap-4">
                <div class="relative flex h-16 w-28 shrink-0 items-center justify-center overflow-hidden rounded-md border border-dashed border-border bg-surface-2 text-text-muted">
                  <span data-upload-placeholder class="text-xs">Sin logo</span>
                  <img data-upload-preview class="hidden h-full w-full object-contain" alt="" />
                </div>
                <div class="flex-1 space-y-2">
                  <input type="file" accept="image/*" data-upload-input class="hidden" />
                  <button type="button" data-upload-trigger class="rounded-md border border-border px-4 py-2 text-sm font-medium text-text transition hover:bg-surface-2">Subir logo</button>
                  <p class="text-xs text-text-muted">Si no se sube ninguno, se muestra un recuadro con el nombre como placeholder.</p>
                </div>
              </div>
            </div>

            <div class="flex items-center justify-end gap-3">
              <a href="enlaces-interes.html" class="rounded-md border border-border px-5 py-2.5 text-sm font-semibold text-text transition hover:bg-surface-2">Cancelar</a>
              <button type="submit" class="rounded-md bg-accent px-5 py-2.5 text-sm font-semibold text-primary-dark transition hover:bg-accent-dark">Guardar</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <admin-toast></admin-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/admin-common.js"></script>
    <script src="../../components/admin-sidebar.js"></script>
    <script src="../../components/admin-topbar.js"></script>
    <script src="../../components/admin-toast.js"></script>
  </body>
</html>
