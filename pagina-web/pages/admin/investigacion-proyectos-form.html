<!-- pages/admin/investigacion-proyectos-form.html -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../assets/img/facultad/logo_universidad.ico" />
    <title>Editar proyecto de investigación — Panel de Administración | Facultad de Administración UNAMBA (Mockup)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <admin-sidebar></admin-sidebar>

    <div class="admin-canvas flex min-h-screen flex-col lg:pl-72">
      <admin-topbar page-title="Proyectos de investigación"></admin-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-3xl">
          <a href="investigacion-proyectos.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-text-muted transition hover:text-text">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            Volver a Proyectos de investigación
          </a>
          <h2 class="mt-2 font-heading text-xl font-bold text-text">Editar proyecto de investigación</h2>

          <form data-admin-form data-redirect="investigacion-proyectos.html" class="mt-6 space-y-6">
            <!-- Información general -->
            <div class="admin-card p-5 sm:p-6">
              <h3 class="font-heading text-base font-semibold text-text">Información general</h3>
              <div class="mt-4 grid grid-cols-1 gap-4">
                <div>
                  <label for="proyecto-titulo" class="block text-sm font-medium text-text">Título</label>
                  <input id="proyecto-titulo" type="text" value="Factores que determinan la competitividad de la MYPE en Abancay" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
                <div>
                  <label for="proyecto-descripcion" class="block text-sm font-medium text-text">Descripción</label>
                  <textarea id="proyecto-descripcion" rows="3" class="mt-1.5 w-full resize-y rounded-md border border-border bg-bg px-3 py-2 text-sm text-text focus:border-primary focus:outline-none">Analiza los factores internos y externos que explican el desempeño competitivo de las micro y pequeñas empresas de la provincia.</textarea>
                </div>
              </div>
              <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                  <label for="proyecto-linea" class="block text-sm font-medium text-text">Línea de investigación <span class="text-text-muted">(opcional)</span></label>
                  <select id="proyecto-linea" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none">
                    <option value="">Sin línea asociada</option>
                    <option value="gestion-empresarial" selected>Gestión y Desarrollo Empresarial</option>
                    <option value="finanzas-emprendimiento">Finanzas y Emprendimiento Regional</option>
                    <option value="gestion-publica">Gestión Pública y Políticas de Desarrollo</option>
                  </select>
                </div>
                <div>
                  <label for="proyecto-responsable" class="block text-sm font-medium text-text">Responsable</label>
                  <select id="proyecto-responsable" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none">
                    <option value="rosa-illanes" selected>Dra. Rosa Illanes Cárdenas</option>
                    <option value="carlos-huaman">Mg. Carlos Huamán Quispe</option>
                    <option value="jorge-ttito">Mg. Jorge Ttito Mamani</option>
                  </select>
                  <p class="mt-1.5 text-xs text-text-muted">Solo docentes de la facultad — ver <a href="docentes.html" class="font-medium text-primary hover:text-primary-dark">Docentes</a>.</p>
                </div>
              </div>
              <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                  <label for="proyecto-inicio" class="block text-sm font-medium text-text">Fecha de inicio</label>
                  <input id="proyecto-inicio" type="date" value="2025-03-01" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
                <div>
                  <label for="proyecto-fin" class="block text-sm font-medium text-text">Fecha de fin <span class="text-text-muted">(opcional)</span></label>
                  <input id="proyecto-fin" type="date" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
              </div>
              <p class="mt-3 rounded-md bg-info-bg px-3 py-2 text-xs text-info">
                Sin campo de estado: vacío o fecha futura en "Fecha de fin" = <strong>En curso</strong> en el
                listado; si ya pasó, se muestra <strong>Concluido</strong> automáticamente.
              </p>
            </div>

            <div class="flex items-center justify-end gap-3">
              <a href="investigacion-proyectos.html" class="rounded-md border border-border px-5 py-2.5 text-sm font-semibold text-text transition hover:bg-surface-2">Cancelar</a>
              <button type="submit" class="rounded-md bg-accent px-5 py-2.5 text-sm font-semibold text-primary-dark transition hover:bg-accent-dark">Guardar</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <admin-toast></admin-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/admin-common.js"></script>
    <script src="../../components/admin-sidebar.js"></script>
    <script src="../../components/admin-topbar.js"></script>
    <script src="../../components/admin-toast.js"></script>
  </body>
</html>
