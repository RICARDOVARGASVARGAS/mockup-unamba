<!-- pages/admin/investigacion-lineas-form.html -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../assets/img/facultad/logo_universidad.ico" />
    <title>Editar línea de investigación — Panel de Administración | Facultad de Administración UNAMBA (Mockup)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <admin-sidebar></admin-sidebar>

    <div class="admin-canvas flex min-h-screen flex-col lg:pl-72">
      <admin-topbar page-title="Líneas de investigación"></admin-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-3xl">
          <a href="investigacion-lineas.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-text-muted transition hover:text-text">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            Volver a Líneas de investigación
          </a>
          <h2 class="mt-2 font-heading text-xl font-bold text-text">Editar línea de investigación</h2>

          <form data-admin-form data-redirect="investigacion-lineas.html" class="mt-6 space-y-6">
            <!-- Información general -->
            <div class="admin-card p-5 sm:p-6">
              <h3 class="font-heading text-base font-semibold text-text">Información general</h3>
              <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-[88px_1fr]">
                <div>
                  <label for="linea-icono" class="block text-sm font-medium text-text">Ícono <span class="text-text-muted">(opcional)</span></label>
                  <input id="linea-icono" type="text" value="📊" maxlength="2" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-center text-lg text-text focus:border-primary focus:outline-none" />
                </div>
                <div>
                  <label for="linea-nombre" class="block text-sm font-medium text-text">Nombre</label>
                  <input id="linea-nombre" type="text" value="Gestión y Desarrollo Empresarial" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
              </div>
              <div class="mt-4">
                <label for="linea-descripcion" class="block text-sm font-medium text-text">Descripción</label>
                <textarea id="linea-descripcion" rows="3" class="mt-1.5 w-full resize-y rounded-md border border-border bg-bg px-3 py-2 text-sm text-text focus:border-primary focus:outline-none">Competitividad, productividad e innovación en la micro y pequeña empresa regional.</textarea>
              </div>
              <div class="mt-4 max-w-[160px]">
                <label for="linea-orden" class="block text-sm font-medium text-text">Orden</label>
                <input id="linea-orden" type="number" min="1" value="1" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                <p class="mt-1.5 text-xs text-text-muted">Posición en el listado público.</p>
              </div>
            </div>

            <div class="flex items-center justify-end gap-3">
              <a href="investigacion-lineas.html" class="rounded-md border border-border px-5 py-2.5 text-sm font-semibold text-text transition hover:bg-surface-2">Cancelar</a>
              <button type="submit" class="rounded-md bg-accent px-5 py-2.5 text-sm font-semibold text-primary-dark transition hover:bg-accent-dark">Guardar</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <admin-toast></admin-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/admin-common.js"></script>
    <script src="../../components/admin-sidebar.js"></script>
    <script src="../../components/admin-topbar.js"></script>
    <script src="../../components/admin-toast.js"></script>
  </body>
</html>
