<!-- pages/admin/documentos-form.html -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../assets/img/facultad/logo_universidad.ico" />
    <title>Editar documento — Panel de Administración | Facultad de Administración UNAMBA (Mockup)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <admin-sidebar></admin-sidebar>

    <div class="admin-canvas flex min-h-screen flex-col lg:pl-72">
      <admin-topbar page-title="Documentos"></admin-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-3xl">
          <a href="documentos.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-text-muted transition hover:text-text">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            Volver a Documentos
          </a>
          <h2 class="mt-2 font-heading text-xl font-bold text-text">Editar documento</h2>

          <form data-admin-form data-redirect="documentos.html" class="mt-6 space-y-6">
            <!-- Información general -->
            <div class="admin-card p-5 sm:p-6">
              <h3 class="font-heading text-base font-semibold text-text">Información general</h3>
              <div class="mt-4">
                <label for="documento-titulo" class="block text-sm font-medium text-text">Título</label>
                <input id="documento-titulo" type="text" value="Sílabo de Contabilidad I" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
              </div>
              <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                  <label for="documento-tipo" class="block text-sm font-medium text-text">Tipo de documento</label>
                  <select id="documento-tipo" data-condition-source="tipo" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none">
                    <option value="reglamentos">Reglamentos</option>
                    <option value="silabos" selected>Sílabos</option>
                    <option value="planes-mallas">Planes y Mallas Curriculares</option>
                    <option value="resoluciones">Resoluciones</option>
                    <option value="gestion">Documentos de Gestión</option>
                    <option value="formatos-tramite">Formatos de Trámite</option>
                  </select>
                </div>
                <div>
                  <label for="documento-anio" class="block text-sm font-medium text-text">Año</label>
                  <input id="documento-anio" type="number" min="2000" max="2100" value="2026" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
                <div data-condition-show="tipo:silabos,planes-mallas">
                  <label for="documento-semestre" class="block text-sm font-medium text-text">Semestre <span class="text-text-muted">(opcional)</span></label>
                  <select id="documento-semestre" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none">
                    <option value="">Sin especificar</option>
                    <option value="I" selected>Semestre I</option>
                    <option value="II">Semestre II</option>
                  </select>
                  <p class="mt-1.5 text-xs text-text-muted">Solo aplica a sílabos y planes de estudio.</p>
                </div>
                <div>
                  <label for="documento-sede" class="block text-sm font-medium text-text">Sede <span class="text-text-muted">(opcional)</span></label>
                  <select id="documento-sede" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none">
                    <option value="">Todas las sedes</option>
                    <option value="abancay" selected>Abancay</option>
                    <option value="cotabambas-tambobamba">Cotabambas-Tambobamba</option>
                  </select>
                  <p class="mt-1.5 text-xs text-text-muted">Vacío = aplica a todas las sedes.</p>
                </div>
                <div>
                  <label for="documento-fecha" class="block text-sm font-medium text-text">Fecha de publicación</label>
                  <input id="documento-fecha" type="date" value="2026-01-15" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
              </div>
            </div>

            <!-- Archivo -->
            <div class="admin-card p-5 sm:p-6" data-upload>
              <h3 class="font-heading text-base font-semibold text-text">Archivo PDF</h3>
              <div class="mt-4 flex items-center gap-4">
                <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-md bg-danger-bg text-danger">
                  <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                  </svg>
                </span>
                <div class="min-w-0 flex-1">
                  <p data-upload-filename class="truncate text-sm font-medium text-text">silabo-contabilidad-i-2026-i.pdf</p>
                  <p class="text-xs text-text-muted">PDF, máx. 10MB.</p>
                </div>
                <input type="file" accept="application/pdf" data-upload-input class="hidden" />
                <button type="button" data-upload-trigger class="shrink-0 rounded-md border border-border px-4 py-2 text-sm font-medium text-text transition hover:bg-surface-2">Reemplazar</button>
              </div>
            </div>

            <!-- Publicación -->
            <div class="admin-card p-5 sm:p-6">
              <h3 class="font-heading text-base font-semibold text-text">Publicación</h3>
              <div class="mt-4" data-status-group>
                <span class="block text-sm font-medium text-text">Estado</span>
                <div class="mt-2 inline-flex rounded-md border border-border p-1">
                  <button type="button" data-status-option data-status-active-class="bg-primary text-onPrimary" class="rounded px-4 py-1.5 text-sm font-medium text-text-muted transition">Borrador</button>
                  <button type="button" data-status-option data-status-active-class="bg-primary text-onPrimary" class="rounded bg-primary px-4 py-1.5 text-sm font-medium text-onPrimary transition">Publicado</button>
                </div>
              </div>
            </div>

            <div class="flex items-center justify-end gap-3">
              <a href="documentos.html" class="rounded-md border border-border px-5 py-2.5 text-sm font-semibold text-text transition hover:bg-surface-2">Cancelar</a>
              <button type="submit" class="rounded-md bg-accent px-5 py-2.5 text-sm font-semibold text-primary-dark transition hover:bg-accent-dark">Guardar</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <admin-toast></admin-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/admin-common.js"></script>
    <script src="../../components/admin-sidebar.js"></script>
    <script src="../../components/admin-topbar.js"></script>
    <script src="../../components/admin-toast.js"></script>
  </body>
</html>
