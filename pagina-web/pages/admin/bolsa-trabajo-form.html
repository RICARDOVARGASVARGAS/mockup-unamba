<!-- pages/admin/bolsa-trabajo-form.html -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../assets/img/facultad/logo_universidad.ico" />
    <title>Editar oferta — Panel de Administración | Facultad de Administración UNAMBA (Mockup)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <admin-sidebar></admin-sidebar>

    <div class="admin-canvas flex min-h-screen flex-col lg:pl-72">
      <admin-topbar page-title="Bolsa de Trabajo"></admin-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto max-w-3xl">
          <a href="bolsa-trabajo.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-text-muted transition hover:text-text">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            Volver a Bolsa de Trabajo
          </a>
          <h2 class="mt-2 font-heading text-xl font-bold text-text">Editar oferta</h2>

          <form data-admin-form data-redirect="bolsa-trabajo.html" class="mt-6 space-y-6">
            <!-- Información general -->
            <div class="admin-card p-5 sm:p-6">
              <h3 class="font-heading text-base font-semibold text-text">Información general</h3>
              <div class="mt-4">
                <label for="oferta-titulo" class="block text-sm font-medium text-text">Título</label>
                <input id="oferta-titulo" type="text" value="Practicante de Contabilidad" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
              </div>
              <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                  <label for="oferta-empresa" class="block text-sm font-medium text-text">Empresa</label>
                  <select id="oferta-empresa" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none">
                    <option value="consultora-andina" selected>Consultora Andina SAC</option>
                    <option value="grupo-apurimac">Grupo Empresarial Apurímac</option>
                    <option value="financiera-regional">Financiera Regional del Sur</option>
                    <option value="agrosur">AgroSur Perú</option>
                    <option value="tunegocio">TúNegocio Consultores</option>
                    <option value="nueva">+ Registrar nueva empresa…</option>
                  </select>
                </div>
                <div>
                  <label for="oferta-tipo" class="block text-sm font-medium text-text">Tipo de oferta</label>
                  <select id="oferta-tipo" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none">
                    <option value="practica-pre" selected>Práctica pre-profesional</option>
                    <option value="practica-pro">Práctica profesional</option>
                    <option value="empleo">Empleo</option>
                  </select>
                </div>
              </div>
              <div class="mt-4">
                <label for="oferta-descripcion" class="block text-sm font-medium text-text">Descripción</label>
                <textarea id="oferta-descripcion" rows="3" class="mt-1.5 w-full resize-y rounded-md border border-border bg-bg px-3 py-2 text-sm text-text focus:border-primary focus:outline-none">Apoyo en registro contable, conciliaciones bancarias y elaboración de reportes tributarios.</textarea>
              </div>
              <div class="mt-4">
                <label for="oferta-enlace" class="block text-sm font-medium text-text">Enlace de postulación</label>
                <input id="oferta-enlace" type="url" value="https://forms.gle/ejemplo-practicante-contabilidad" placeholder="https://..." class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
              </div>
              <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                  <label for="oferta-fecha" class="block text-sm font-medium text-text">Fecha de publicación</label>
                  <input id="oferta-fecha" type="date" value="2026-06-20" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
                <div>
                  <label for="oferta-vigencia" class="block text-sm font-medium text-text">Vigente hasta <span class="text-text-muted">(opcional)</span></label>
                  <input id="oferta-vigencia" type="date" value="2026-07-20" class="mt-1.5 h-11 w-full rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
                </div>
              </div>
              <p class="mt-3 rounded-md bg-info-bg px-3 py-2 text-xs text-info">
                Sin campo de estado propio: vacío o fecha futura en "Vigente hasta" = <strong>vigente</strong>; si
                ya pasó, se muestra <strong>Vencida</strong> automáticamente. No la elimines, solo deja que pase
                la fecha si quieres archivarla.
              </p>
            </div>

            <!-- Publicación -->
            <div class="admin-card p-5 sm:p-6">
              <h3 class="font-heading text-base font-semibold text-text">Publicación</h3>
              <div class="mt-4" data-status-group>
                <span class="block text-sm font-medium text-text">Estado</span>
                <div class="mt-2 inline-flex rounded-md border border-border p-1">
                  <button type="button" data-status-option data-status-active-class="bg-primary text-onPrimary" class="rounded px-4 py-1.5 text-sm font-medium text-text-muted transition">Borrador</button>
                  <button type="button" data-status-option data-status-active-class="bg-primary text-onPrimary" class="rounded bg-primary px-4 py-1.5 text-sm font-medium text-onPrimary transition">Publicado</button>
                </div>
              </div>
            </div>

            <div class="flex items-center justify-end gap-3">
              <a href="bolsa-trabajo.html" class="rounded-md border border-border px-5 py-2.5 text-sm font-semibold text-text transition hover:bg-surface-2">Cancelar</a>
              <button type="submit" class="rounded-md bg-accent px-5 py-2.5 text-sm font-semibold text-primary-dark transition hover:bg-accent-dark">Guardar</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <admin-toast></admin-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/admin-common.js"></script>
    <script src="../../components/admin-sidebar.js"></script>
    <script src="../../components/admin-topbar.js"></script>
    <script src="../../components/admin-toast.js"></script>
  </body>
</html>
