<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocenTrack — Registro de horas lectivas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
    />

    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/base.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
  </head>
  <body class="kiosk-shell bg-bg text-text">
    <!-- Cabecera del kiosko: marca, reloj, tema, modo de interacción -->
    <kiosko-topbar></kiosko-topbar>

    <!-- ESTADO: Reposo — pantalla por defecto, esperando huella -->
    <main class="kiosk-main">
      <div class="kiosk-card flex flex-col items-center gap-6">
        <div class="relative flex h-28 w-28 items-center justify-center rounded-full bg-primary/10">
          <span class="absolute inset-0 animate-ping rounded-full bg-primary/10"></span>
          <svg class="relative h-14 w-14 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.864 4.243A7.5 7.5 0 0 1 19.5 10.5c0 2.92-.556 5.709-1.568 8.268M5.742 6.364A7.465 7.465 0 0 0 4.5 10.5a7.464 7.464 0 0 1-1.15 3.993m1.989 3.559A11.209 11.209 0 0 0 8.25 10.5a3.75 3.75 0 1 1 7.5 0c0 .527-.021 1.049-.064 1.565M12 10.5a14.94 14.94 0 0 1-3.6 9.75m6.633-4.596a18.666 18.666 0 0 1-2.485 5.33" />
          </svg>
        </div>

        <div>
          <h1 class="font-heading text-2xl font-semibold text-text">Coloque su dedo en el lector</h1>
          <p class="mt-2 text-base text-text-muted">
            Lo identificaremos automáticamente para registrar la clase que acaba de dictar.
          </p>
        </div>

        <span class="badge badge-neutral">Esperando huella…</span>
      </div>
    </main>

    <!-- Herramienta de mockup: forzar cualquier estado del flujo para la demo -->
    <kiosko-debug-panel></kiosko-debug-panel>

    <script src="./js/theme.js"></script>
    <script src="./js/site-paths.js"></script>
    <script src="./js/interaction-mode.js"></script>
    <script src="./components/kiosko-topbar.js"></script>
    <script src="./components/kiosko-debug-panel.js"></script>
  </body>
</html>
