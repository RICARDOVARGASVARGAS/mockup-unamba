<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Periodos académicos — Panel de Administración | DocenTrack (Mockup)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <admin-sidebar></admin-sidebar>

    <div class="admin-canvas flex min-h-screen flex-col lg:pl-72">
      <admin-topbar page-title="Periodos académicos"></admin-topbar>

      <main class="flex-1 space-y-6 p-4 sm:p-6 lg:p-8">
        <div>
          <h2 class="font-heading text-xl font-bold text-text">Periodos académicos</h2>
          <p class="text-sm text-text-muted">Semestre o año (ej. 2026-I) — define cuándo rige un horario/asignación. Distinto del ciclo curricular del curso.</p>
        </div>

        <div class="admin-card p-4" data-inline-add>
          <label for="periodo-nuevo" class="block text-sm font-medium text-text">Agregar periodo</label>
          <div class="mt-1.5 flex gap-2">
            <input id="periodo-nuevo" data-inline-add-input type="text" placeholder="Ej. 2026-II" class="h-10 w-full max-w-xs rounded-md border border-border bg-bg px-3 text-sm text-text focus:border-primary focus:outline-none" />
            <button type="button" data-inline-add-button class="inline-flex shrink-0 items-center gap-1.5 rounded-md bg-primary px-4 text-sm font-semibold text-onPrimary transition hover:bg-primary-dark">
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
              Agregar
            </button>
          </div>
        </div>

        <div class="overflow-hidden admin-card">
          <div class="overflow-x-auto">
            <table data-admin-table class="w-full text-left text-sm">
              <thead class="border-b border-border bg-surface-2 text-xs uppercase tracking-wide text-text-muted">
                <tr>
                  <th class="px-4 py-3 font-semibold">Periodo</th>
                  <th class="px-4 py-3 font-semibold">Estado</th>
                  <th class="px-4 py-3 font-semibold text-right">Acciones</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-border">
                <tr data-row data-search="2026-i">
                  <td class="px-4 py-3 font-medium text-text" data-inline-row-value>2026-I</td>
                  <td class="px-4 py-3"><span class="badge badge-success">Activo</span></td>
                  <td class="px-4 py-3 text-right">
                    <button type="button" data-delete-trigger data-delete-name="Periodo 2026-I" aria-label="Eliminar" class="inline-flex h-8 w-8 items-center justify-center rounded-md text-text-muted transition hover:bg-danger-bg hover:text-danger">
                      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
                    </button>
                  </td>
                </tr>
                <tr data-row data-search="2025-ii">
                  <td class="px-4 py-3 font-medium text-text" data-inline-row-value>2025-II</td>
                  <td class="px-4 py-3"><span class="badge badge-neutral">Cerrado</span></td>
                  <td class="px-4 py-3 text-right">
                    <button type="button" data-delete-trigger data-delete-name="Periodo 2025-II" aria-label="Eliminar" class="inline-flex h-8 w-8 items-center justify-center rounded-md text-text-muted transition hover:bg-danger-bg hover:text-danger">
                      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
                    </button>
                  </td>
                </tr>
                <tr data-empty-row class="hidden">
                  <td colspan="3" class="px-4 py-10 text-center text-sm text-text-muted">No se encontraron resultados.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <template data-inline-row-template>
      <tr data-row>
        <td class="px-4 py-3 font-medium text-text" data-inline-row-value></td>
        <td class="px-4 py-3"><span class="badge badge-success">Activo</span></td>
        <td class="px-4 py-3 text-right">
          <button type="button" data-delete-trigger data-delete-name="este periodo" aria-label="Eliminar" class="inline-flex h-8 w-8 items-center justify-center rounded-md text-text-muted transition hover:bg-danger-bg hover:text-danger">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
          </button>
        </td>
      </tr>
    </template>

    <admin-modal-confirm></admin-modal-confirm>
    <admin-toast></admin-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/admin-common.js"></script>
    <script src="../../components/admin-sidebar.js"></script>
    <script src="../../components/admin-topbar.js"></script>
    <script src="../../components/admin-modal-confirm.js"></script>
    <script src="../../components/admin-toast.js"></script>
  </body>
</html>
