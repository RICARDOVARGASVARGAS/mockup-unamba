<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificando huella… — DocenTrack</title>
    <link rel="icon" href="../../assets/img/facultad/logo_universidad.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="kiosk-shell text-text">
    <kiosko-topbar></kiosko-topbar>

    <!-- ESTADO: Leyendo / procesando -->
    <main class="kiosk-main">
      <div class="kiosk-card flex flex-col items-center gap-6">
        <div class="kiosk-fingerprint is-busy" aria-hidden="true">
          <svg class="relative h-14 w-14 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
        </div>

        <div>
          <h1 class="font-heading text-2xl font-semibold text-primary">Verificando huella…</h1>
          <p class="mt-2 text-base text-text-muted">No retire el dedo del lector.</p>
        </div>

        <span class="kiosk-status is-busy">Procesando</span>
      </div>
    </main>

    <kiosko-debug-panel></kiosko-debug-panel>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../js/interaction-mode.js"></script>
    <script src="../../components/kiosko-topbar.js"></script>
    <script src="../../components/kiosko-debug-panel.js"></script>
  </body>
</html>
