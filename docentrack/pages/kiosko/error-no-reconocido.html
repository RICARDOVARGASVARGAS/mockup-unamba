<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huella no reconocida — DocenTrack</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body class="kiosk-shell bg-bg text-text">
    <kiosko-topbar></kiosko-topbar>

    <!-- ESTADO DE ERROR: huella colocada pero sin match 1:N -->
    <main class="kiosk-main">
      <div class="kiosk-card flex flex-col items-center gap-6">
        <div class="relative flex h-20 w-20 items-center justify-center rounded-full bg-danger-bg text-danger">
          <svg class="h-10 w-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.864 4.243A7.5 7.5 0 0 1 19.5 10.5c0 2.92-.556 5.709-1.568 8.268M5.742 6.364A7.465 7.465 0 0 0 4.5 10.5a7.464 7.464 0 0 1-1.15 3.993m1.989 3.559A11.209 11.209 0 0 0 8.25 10.5a3.75 3.75 0 1 1 7.5 0c0 .527-.021 1.049-.064 1.565M12 10.5a14.94 14.94 0 0 1-3.6 9.75m6.633-4.596a18.666 18.666 0 0 1-2.485 5.33" />

          <span class="absolute -bottom-1 -right-1 flex h-8 w-8 items-center justify-center rounded-full bg-danger text-white ring-4 ring-surface">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          </span>
        </div>

        <div>
          <h1 class="font-heading text-2xl font-semibold text-text">Huella no reconocida</h1>
          <p class="mt-2 text-base text-text-muted">No pudimos leerla con claridad. Limpia el lector y vuelve a intentar.</p>
        </div>

        <span class="badge badge-danger">Sin coincidencia</span>

        <div class="flex w-full flex-col gap-3">
          <a href="../../index.html" class="kiosk-btn kiosk-btn-primary w-full">Reintentar</a>
          <p class="text-center text-xs text-text-muted">Si el problema persiste tras varios intentos, avisa al personal de administración.</p>
        </div>
      </div>
    </main>

    <kiosko-debug-panel></kiosko-debug-panel>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../js/interaction-mode.js"></script>
    <script src="../../components/kiosko-topbar.js"></script>
    <script src="../../components/kiosko-debug-panel.js"></script>
