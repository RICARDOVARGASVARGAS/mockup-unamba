<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lector desconectado — DocenTrack</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="kiosk-shell bg-bg text-text">
    <kiosko-topbar></kiosko-topbar>

    <!-- ESTADO DE ERROR: el sistema no detecta el lector de huella (hardware) -->
    <main class="kiosk-main">
      <div class="kiosk-card flex flex-col items-center gap-6">
        <div class="relative flex h-20 w-20 items-center justify-center rounded-full bg-danger-bg text-danger">
          <svg class="h-10 w-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" />
          </svg>
          <span class="absolute -bottom-1 -right-1 flex h-8 w-8 items-center justify-center rounded-full bg-danger text-white ring-4 ring-surface">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          </span>
        </div>

        <div>
          <h1 class="font-heading text-2xl font-semibold text-text">Lector no detectado</h1>
          <p class="mt-2 text-base text-text-muted">
            El sistema no encuentra el lector de huella conectado a este equipo. Avisa al personal de soporte
            técnico.
          </p>
        </div>

        <span class="badge badge-danger">Sin conexión al hardware</span>

        <a href="../../index.html" class="kiosk-btn kiosk-btn-primary w-full">Reintentar conexión</a>
      </div>
    </main>

    <kiosko-debug-panel></kiosko-debug-panel>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../js/interaction-mode.js"></script>
    <script src="../../components/kiosko-topbar.js"></script>
    <script src="../../components/kiosko-debug-panel.js"></script>
  </body>
</html>
