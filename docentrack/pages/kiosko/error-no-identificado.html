<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docente no identificado — DocenTrack</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="kiosk-shell bg-bg text-text">
    <kiosko-topbar></kiosko-topbar>

    <!-- ESTADO DE ERROR: huella leída con claridad, pero sin ningún docente enrolado que coincida -->
    <main class="kiosk-main">
      <div class="kiosk-card flex flex-col items-center gap-6">
        <div class="relative flex h-20 w-20 items-center justify-center rounded-full bg-warning-bg text-warning">
          <svg class="h-10 w-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
          <span class="absolute -bottom-1 -right-1 flex h-8 w-8 items-center justify-center rounded-full bg-warning font-heading text-sm font-bold text-onAccent ring-4 ring-surface">?</span>
        </div>

        <div>
          <h1 class="font-heading text-2xl font-semibold text-text">No encontramos tu registro</h1>
          <p class="mt-2 text-base text-text-muted">
            Leímos tu huella correctamente, pero no hay ningún docente enrolado con ella. Acércate a Administración
            para que te registren.
          </p>
        </div>

        <span class="badge badge-warning">Docente no enrolado</span>

        <a href="../../index.html" class="kiosk-btn kiosk-btn-secondary w-full">Volver a inicio</a>
      </div>
    </main>

    <kiosko-debug-panel></kiosko-debug-panel>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../js/interaction-mode.js"></script>
    <script src="../../components/kiosko-topbar.js"></script>
    <script src="../../components/kiosko-debug-panel.js"></script>
  </body>
</html>
