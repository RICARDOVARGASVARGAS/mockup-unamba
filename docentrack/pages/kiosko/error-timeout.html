<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiempo agotado — DocenTrack</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body data-kiosk-page="error-timeout" class="kiosk-shell bg-bg text-text">
    <kiosko-topbar></kiosko-topbar>

    <!-- ESTADO DE ERROR: se acabó el tiempo de espera sin dedo en el lector -->
    <main class="kiosk-main">
      <div class="kiosk-card flex flex-col items-center gap-6">
        <div class="flex h-20 w-20 items-center justify-center rounded-full bg-warning-bg text-warning">
          <svg class="h-10 w-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
        </div>

        <div>
          <h1 class="font-heading text-2xl font-semibold text-text">Se agotó el tiempo de espera</h1>
          <p class="mt-2 text-base text-text-muted">No detectamos ningún dedo en el lector. Vuelve a intentarlo.</p>
        </div>

        <span class="badge badge-warning">Timeout de captura</span>

        <a href="../../index.html" class="kiosk-btn kiosk-btn-primary w-full">Reintentar</a>
      </div>
    </main>
    <footer class="kiosk-reader-bar" data-reader-status data-state="online">
      <div class="kiosk-reader-bar-inner">
        <span class="kiosk-reader-dot" aria-hidden="true"></span>
        <span data-reader-label>Lector biométrico listo</span>
      </div>
    </footer>

    <kiosko-toast></kiosko-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/kiosko-topbar.js"></script>
    <script src="../../components/kiosko-toast.js"></script>
    <script src="../../js/kiosko-sim.js"></script>

</body>
</html>
