<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Llenar ficha | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Llenar ficha"
        user-name="Ana Quispe Mamani"
        user-role="Estudiante"
        user-initials="AQ"
      ></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto w-full max-w-lg space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-2">
            <a href="mis-fichas.html" class="text-sm font-medium text-primary hover:underline">← Mis fichas</a>
            <span data-save-indicator class="text-xs text-text-muted" aria-live="polite"></span>
          </div>
          <div>
            <h2 data-ficha-nombre class="font-heading text-xl font-bold text-text">Ficha</h2>
            <div class="mt-3">
              <div class="flex items-center justify-between text-sm">
                <span class="text-text-muted">Progreso</span>
                <span data-progreso-texto class="font-medium text-text">0 / 0</span>
              </div>
              <div class="mt-1.5 h-2 overflow-hidden rounded-full bg-border">
                <div data-progreso-bar class="h-full rounded-full bg-primary transition-all" style="width: 0%"></div>
              </div>
            </div>
          </div>

          <form data-llenar-form class="space-y-4" novalidate></form>

          <div data-acciones class="sticky bottom-0 -mx-4 border-t border-border bg-bg/95 px-4 py-3 backdrop-blur sm:mx-0 sm:rounded-lg sm:border sm:px-4">
            <div class="flex flex-col gap-2 sm:flex-row sm:justify-end">
              <button type="button" data-btn-borrador class="btn-secondary w-full sm:w-auto">Guardar borrador</button>
              <button type="button" data-btn-enviar class="btn-primary w-full sm:w-auto" disabled>Enviar</button>
            </div>
            <p data-solo-lectura class="hidden text-center text-sm text-text-muted">Esta ficha ya fue enviada y no se puede editar.</p>
          </div>
        </div>
      </main>
    </div>

    <app-modal-confirm></app-modal-confirm>
    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-modal-confirm.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/fichas-data.js"></script>
    <script src="../../js/fichas-ciclo-data.js"></script>
    <script src="../../js/llenar-ficha.js"></script>
  </body>
</html>
