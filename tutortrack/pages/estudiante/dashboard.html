<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio Estudiante | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Inicio"
        user-name="Ana Quispe Mamani"
        user-role="Estudiante"
        user-initials="AQ"
        user-ciclo="5"
        user-avatar="assets/img/estudiantes/estudiante-1.jpg"
      ></app-topbar>

      <main class="flex-1 space-y-5 p-4 sm:p-6 lg:p-8 max-w-3xl">
        <div>
          <h2 class="font-heading text-2xl font-bold text-text">Hola, <span data-nombre>Ana</span> 👋</h2>
          <p class="text-sm text-text-muted" data-contexto>Quinto ciclo · 2026-I</p>
        </div>

        <!-- Tarjetas de seguimiento (solo si visible_estudiante=1) -->
        <div data-seguimiento class="space-y-3" hidden></div>

        <section class="app-card p-5">
          <h3 class="section-title">Tu próxima ficha</h3>
          <div class="mt-3 flex flex-wrap items-center justify-between gap-3" data-proxima-ficha>
            <p class="text-sm text-text-muted">Cargando…</p>
          </div>
        </section>

        <section class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div class="app-card p-5">
            <h3 class="section-title">Tu progreso</h3>
            <div class="mt-3 h-2.5 overflow-hidden rounded-full bg-border">
              <div class="h-full rounded-full bg-primary" data-progreso-bar style="width: 40%"></div>
            </div>
            <p class="mt-2 text-sm text-text-muted" data-progreso-label>—</p>
          </div>
          <div class="app-card p-5">
            <h3 class="section-title">Tu tutor</h3>
            <div class="mt-3" data-tutor-card>
              <p class="text-sm font-medium text-text" data-tutor-nombre>—</p>
              <p class="text-sm text-text-muted" data-tutor-email>—</p>
            </div>
            <a href="tutor.html" class="section-link mt-3 inline-block">Ver detalle</a>
          </div>
        </section>
      </main>
    </div>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../js/fichas-data.js"></script>
    <script src="../../js/fichas-ciclo-data.js"></script>
    <script src="../../js/entidades-receptoras-data.js"></script>
    <script src="../../js/alertas-derivaciones-data.js"></script>
    <script src="../../js/dashboard-estudiante.js"></script>
  </body>
</html>
