<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docentes | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Docentes"
        user-name="Ricardo Vargas Vargas"
        user-role="Administrador"
        user-initials="RV"
        user-avatar="assets/img/admin/ricardo-vargas.jpg"
      ></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <!-- Cards de resumen (conteo global inmutable) -->
        <div class="people-summary" data-people-summary aria-label="Resumen de docentes">
          <article class="people-summary-card people-summary-total">
            <div class="people-summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
              </svg>
            </div>
            <div>
              <p class="people-summary-label">Total docentes</p>
              <p class="people-summary-value" data-summary-total>0</p>
              <p class="people-summary-sub">registrados</p>
            </div>
          </article>
          <article class="people-summary-card people-summary-active">
            <div class="people-summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
              </svg>
            </div>
            <div>
              <p class="people-summary-label">Activos</p>
              <p class="people-summary-value" data-summary-activos>0</p>
              <p class="people-summary-sub">con acceso habilitado</p>
            </div>
          </article>
          <article class="people-summary-card people-summary-inactive">
            <div class="people-summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" />
              </svg>
            </div>
            <div>
              <p class="people-summary-label">Inactivos</p>
              <p class="people-summary-value" data-summary-inactivos>0</p>
              <p class="people-summary-sub">sin acceso</p>
            </div>
          </article>
        </div>

        <section class="app-card catalog-panel mt-5" data-catalog data-audit-table="docente" data-delete-toast="Docente eliminado">
          <div class="catalog-head">
            <div>
              <h2 class="font-heading">Docentes</h2>
              <p>Docentes-tutores del sistema (Usuario + perfil + roles)</p>
            </div>
            <div class="catalog-head-actions">
              <button type="button" data-catalog-refresh class="btn-secondary">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
                </svg>
                Actualizar lista
              </button>
              <button type="button" data-open-create class="btn-primary">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Nuevo docente
              </button>
            </div>
          </div>

          <div class="catalog-query">
            <div class="catalog-field catalog-field-grow">
              <label for="catalog-search">Buscar</label>
              <input
                id="catalog-search"
                type="search"
                data-catalog-search
                class="catalog-input"
                placeholder="Buscar por nombre, apellido, documento o correo…"
              />
            </div>
            <div class="catalog-field">
              <label for="filter-especialidad">Especialidad</label>
              <select id="filter-especialidad" data-filter="especialidad" class="catalog-select min-w-[11rem]">
                <option value="">Todas</option>
              </select>
            </div>
            <div class="catalog-field">
              <label for="filter-estado">Estado</label>
              <select id="filter-estado" data-filter="estado" class="catalog-select min-w-[10rem]">
                <option value="">Todos</option>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>
            <div class="catalog-query-actions">
              <button type="button" data-catalog-search-btn class="btn-secondary btn-icon" title="Buscar" aria-label="Buscar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
              </button>
              <button type="button" data-catalog-clear class="btn-ghost btn-icon" title="Limpiar" aria-label="Limpiar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>

          <div class="catalog-meta" data-catalog-meta></div>
          <div class="catalog-table-wrap" data-catalog-table-wrap>
            <table class="catalog-table">
              <thead data-catalog-thead></thead>
              <tbody data-catalog-body></tbody>
            </table>
          </div>
          <div class="catalog-empty hidden" data-catalog-empty>
            <p>No se encontraron docentes con esos criterios.</p>
          </div>
          <div class="catalog-pagination" data-catalog-pagination></div>
        </section>
      </main>
    </div>

    <app-modal-confirm></app-modal-confirm>
    <app-modal-historial></app-modal-historial>
    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-modal-confirm.js"></script>
    <script src="../../js/auditoria-data.js"></script>
    <script src="../../components/app-modal-historial.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/catalog-table.js"></script>
    <script src="../../js/tipos-documento-data.js"></script>
    <script src="../../js/docentes-data.js"></script>
    <script src="../../js/docentes.js"></script>
  </body>
</html>
