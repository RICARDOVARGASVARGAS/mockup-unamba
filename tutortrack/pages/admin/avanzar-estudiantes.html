<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avanzar estudiantes | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Avanzar estudiantes"
        user-name="Ricardo Vargas Vargas"
        user-role="Administrador"
        user-initials="RV"
        user-avatar="assets/img/admin/ricardo-vargas.jpg"
      ></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-5">
        <section class="app-card p-5">
          <h2 class="font-heading text-xl font-bold">Avanzar estudiantes</h2>
          <p class="mt-1 text-sm text-text-muted">
            El sistema propone el ciclo siguiente; tú revisas y corriges. No es un botón ciego.
          </p>
          <div class="mt-4 flex flex-wrap items-end gap-3">
            <div>
              <label for="sel-origen" class="form-label">Origen</label>
              <select id="sel-origen" class="form-input min-w-[9rem]"></select>
            </div>
            <span class="pb-2.5 text-text-muted" aria-hidden="true">→</span>
            <div>
              <label for="sel-destino" class="form-label">Destino</label>
              <select id="sel-destino" class="form-input min-w-[9rem]"></select>
            </div>
            <button type="button" id="btn-generar" class="btn-primary">Generar propuesta</button>
          </div>
        </section>

        <div id="panel-propuesta" class="hidden space-y-4">
          <div class="avanzar-counters" id="contadores" role="group" aria-label="Resumen de propuesta"></div>

          <section class="app-card catalog-panel">
            <div class="catalog-query">
              <div class="catalog-field">
                <label for="filtro-accion">Acción</label>
                <select id="filtro-accion" class="catalog-select min-w-[9rem]">
                  <option value="">Todas</option>
                  <option value="avanza">Avanza</option>
                  <option value="repite">Repite</option>
                  <option value="egresa">Egresa</option>
                  <option value="excluir">Excluir</option>
                  <option value="sin_tutor">⚠ Sin tutor</option>
                </select>
              </div>
              <div class="catalog-field">
                <label for="filtro-tutor">Tutor destino</label>
                <select id="filtro-tutor" class="catalog-select min-w-[11rem]">
                  <option value="">Todos</option>
                </select>
              </div>
              <div class="catalog-field catalog-field-grow">
                <label for="filtro-buscar">Buscar</label>
                <input id="filtro-buscar" type="search" class="catalog-input" placeholder="Nombre o código…" />
              </div>
            </div>

            <div class="catalog-table-wrap">
              <table class="catalog-table">
                <thead>
                  <tr>
                    <th class="w-10 text-center">
                      <input id="check-all" type="checkbox" class="h-4 w-4 rounded border-border text-primary" aria-label="Seleccionar visibles" />
                    </th>
                    <th>Estudiante</th>
                    <th>Ciclo act.</th>
                    <th>→ Destino</th>
                    <th>Tutor destino</th>
                    <th>Acción</th>
                  </tr>
                </thead>
                <tbody id="tbody-propuesta"></tbody>
              </table>
            </div>

            <div class="bulk-bar is-visible" id="bulk-bar">
              <span class="bulk-bar-count" id="bulk-count">Con seleccionados:</span>
              <select id="bulk-accion" class="form-input w-auto py-1.5 text-sm">
                <option value="">Acción…</option>
                <option value="avanza">Avanza</option>
                <option value="repite">Repite</option>
                <option value="egresa">Egresa</option>
                <option value="excluir">Excluir</option>
              </select>
              <select id="bulk-tutor" class="form-input w-auto min-w-[11rem] py-1.5 text-sm">
                <option value="">Asignar tutor…</option>
              </select>
              <button type="button" id="btn-bulk" class="btn-secondary btn-sm">Aplicar</button>
              <div class="ml-auto">
                <button type="button" id="btn-confirmar" class="btn-primary">Confirmar</button>
              </div>
            </div>
          </section>
        </div>

        <div id="panel-vacio" class="app-card gp-empty">
          <p class="font-medium text-text">Aún no hay propuesta</p>
          <p class="mt-1 text-sm">Elige origen y destino, luego genera la propuesta para revisarla.</p>
        </div>
      </main>
    </div>

    <app-toast></app-toast>
    <app-modal-confirm></app-modal-confirm>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../components/app-modal-confirm.js"></script>
    <script src="../../js/gestion-periodo-data.js"></script>
    <script src="../../js/matriculas-data.js"></script>
    <script src="../../js/avanzar-estudiantes-data.js"></script>
    <script src="../../js/avanzar-estudiantes.js"></script>
  </body>
</html>
