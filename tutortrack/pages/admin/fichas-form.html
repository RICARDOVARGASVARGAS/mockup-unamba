<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ficha | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar page-title="Fichas" user-name="Ricardo Vargas Vargas" user-role="Administrador" user-initials="RV" user-avatar="assets/img/admin/ricardo-vargas.jpg"></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-5">

        <div class="flex items-center justify-between gap-4">
          <div>
            <a href="fichas.html" class="text-sm font-medium text-primary hover:text-primary-dark">← Volver al listado</a>
            <h2 id="form-title" class="mt-1 font-heading text-xl font-bold text-text">Nueva ficha</h2>
          </div>
          <div id="modo-ver-badge" class="hidden">
            <span class="badge badge-neutral">Modo lectura</span>
          </div>
        </div>

        <!-- Sección 1: Datos de la ficha -->
        <form id="ficha-form" data-ficha-form class="space-y-5" novalidate>
          <section class="app-card p-5 sm:p-6">
            <h3 class="section-title">Datos de la ficha</h3>
            <div class="mt-5 space-y-4">
              <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                  <label for="fch-nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                  <input id="fch-nombre" name="nombre" type="text" required class="form-input" placeholder="Ej. Ficha diagnóstica inicial" />
                </div>
                <div>
                  <label for="fch-tipo" class="form-label">Tipo de ficha <span class="text-danger">*</span></label>
                  <select id="fch-tipo" name="tipo_ficha_id" required class="form-input">
                    <option value="">Seleccionar…</option>
                  </select>
                </div>
              </div>
              <div>
                <label for="fch-desc" class="form-label">Descripción</label>
                <textarea id="fch-desc" name="descripcion" rows="2" class="form-textarea" placeholder="Descripción opcional de la ficha…"></textarea>
              </div>
              <div>
                <span class="form-label">Estado</span>
                <button type="button" id="fch-activo-toggle" class="status-toggle status-toggle-lg mt-1.5" role="switch" aria-checked="true" aria-label="Estado de la ficha">
                  <span class="status-toggle-thumb" aria-hidden="true"></span>
                  <span class="status-toggle-label" data-on>Activa</span>
                  <span class="status-toggle-label" data-off>Inactiva</span>
                </button>
                <input id="fch-activo" type="checkbox" checked class="sr-only" tabindex="-1" aria-hidden="true" />
              </div>
            </div>
          </section>

          <!-- Sección 2: Constructor de preguntas -->
          <section class="app-card p-5 sm:p-6">
            <div class="flex items-center justify-between gap-3">
              <div>
                <h3 class="section-title">Preguntas</h3>
                <p id="preguntas-count" class="mt-0.5 text-sm text-text-muted">0 preguntas</p>
              </div>
              <button type="button" id="btn-agregar-pregunta" class="btn-secondary">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Agregar pregunta
              </button>
            </div>
            <div id="preguntas-list" class="mt-5 space-y-2"></div>
            <div id="preguntas-empty" class="mt-5 rounded-lg border border-dashed border-border py-8 text-center text-text-muted">
              <p class="text-sm">Sin preguntas aún. Usa "Agregar pregunta" para comenzar.</p>
            </div>
          </section>

          <div id="form-footer" class="sticky bottom-0 z-10 -mx-4 border-t border-border bg-bg/95 px-4 py-3 backdrop-blur sm:-mx-0 sm:rounded-lg sm:border sm:px-5">
            <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
              <a href="fichas.html" class="btn-secondary inline-flex justify-center">Cancelar</a>
              <button type="submit" class="btn-primary">Guardar ficha</button>
            </div>
          </div>
        </form>

      </main>
    </div>

    <!-- Modal: Agregar / Editar pregunta -->
    <div id="modal-pregunta-backdrop" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
      <div class="modal-panel w-full max-w-lg max-h-[90vh] overflow-y-auto">
        <h2 id="modal-pregunta-title" class="font-heading text-lg font-bold">Nueva pregunta</h2>
        <form id="form-pregunta" class="mt-4 space-y-4" novalidate>
          <input type="hidden" id="preg-editing-id" />

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div>
              <label for="preg-area" class="form-label">Área <span class="text-danger">*</span></label>
              <select id="preg-area" required class="form-input">
                <option value="">Seleccionar…</option>
              </select>
            </div>
            <div>
              <label for="preg-tipo" class="form-label">Tipo <span class="text-danger">*</span></label>
              <select id="preg-tipo" required class="form-input">
                <option value="">Seleccionar…</option>
              </select>
            </div>
          </div>

          <div>
            <label for="preg-enunciado" class="form-label">Enunciado <span class="text-danger">*</span></label>
            <textarea id="preg-enunciado" rows="3" required class="form-textarea" placeholder="Escribe la pregunta…"></textarea>
          </div>

          <!-- Opciones (alternativa_unica / respuesta_multiple) -->
          <div id="seccion-opciones" class="hidden space-y-3">
            <div>
              <p class="form-label mb-2">Opciones de respuesta <span class="text-danger">*</span></p>
              <ul id="opciones-list" class="space-y-1.5"></ul>
              <div class="mt-2 flex gap-2">
                <input id="nueva-opcion" type="text" class="form-input flex-1" placeholder="Nueva opción…" />
                <button type="button" id="btn-add-opcion" class="btn-secondary shrink-0">Agregar</button>
              </div>
            </div>
          </div>

          <!-- Escala -->
          <div id="seccion-escala" class="hidden grid grid-cols-2 gap-4">
            <div>
              <label for="escala-min" class="form-label">Valor mínimo</label>
              <input id="escala-min" type="number" min="1" max="10" value="1" class="form-input" />
            </div>
            <div>
              <label for="escala-max" class="form-label">Valor máximo</label>
              <input id="escala-max" type="number" min="2" max="10" value="5" class="form-input" />
            </div>
            <div>
              <label for="escala-label-min" class="form-label">Etiqueta mínimo</label>
              <input id="escala-label-min" type="text" class="form-input" placeholder="Ej. Muy mal" />
            </div>
            <div>
              <label for="escala-label-max" class="form-label">Etiqueta máximo</label>
              <input id="escala-label-max" type="text" class="form-input" placeholder="Ej. Muy bien" />
            </div>
          </div>

          <div class="flex justify-end gap-3 pt-2">
            <button type="button" id="btn-pregunta-cancelar" class="btn-secondary">Cancelar</button>
            <button type="submit" class="btn-primary">Guardar pregunta</button>
          </div>
        </form>
      </div>
    </div>

    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/fichas-data.js"></script>
    <script src="../../js/fichas-form.js"></script>
  </body>
</html>
