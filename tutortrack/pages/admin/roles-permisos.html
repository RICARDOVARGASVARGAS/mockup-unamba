<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roles y permisos | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar page-title="Roles y permisos" user-name="Ricardo Vargas Vargas" user-role="Administrador" user-initials="RV" user-avatar="assets/img/admin/ricardo-vargas.jpg"></app-topbar>
      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <section class="app-card catalog-panel">
          <div class="catalog-head">
            <div>
              <h2 class="font-heading">Roles y permisos</h2>
              <p>RBAC: los permisos se asignan a roles, nunca directo al usuario</p>
            </div>
            <button type="button" data-open-create class="btn-primary">
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
              <span data-create-label>Nuevo rol</span>
            </button>
          </div>

          <div class="catalog-tabs" role="tablist" aria-label="Secciones RBAC">
            <button type="button" class="catalog-tab" role="tab" data-tab="roles" aria-selected="true">Roles</button>
            <button type="button" class="catalog-tab" role="tab" data-tab="permisos" aria-selected="false">Permisos</button>
          </div>

          <!-- Panel Roles -->
          <div data-panel="roles" data-catalog="roles">
            <div class="catalog-query">
              <div class="catalog-field catalog-field-grow">
                <label for="search-roles">Buscar</label>
                <input id="search-roles" type="search" data-catalog-search class="catalog-input" placeholder="Buscar rol…" />
              </div>
              <div class="catalog-field">
                <label for="filter-ambito-rol">Ámbito</label>
                <select id="filter-ambito-rol" data-filter="ambito" class="catalog-select min-w-[11rem]">
                  <option value="">Todos</option>
                  <option value="interno">Interno</option>
                  <option value="receptor">Entidad receptora</option>
                </select>
              </div>
              <div class="catalog-query-actions">
                <button type="button" data-catalog-search-btn class="btn-secondary btn-icon" title="Buscar" aria-label="Buscar">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
                </button>
                <button type="button" data-catalog-clear class="btn-ghost btn-icon" title="Limpiar" aria-label="Limpiar">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
                </button>
              </div>
            </div>
            <div class="catalog-meta" data-catalog-meta></div>
            <div class="catalog-table-wrap" data-catalog-table-wrap>
              <table class="catalog-table">
                <thead data-catalog-thead></thead>
                <tbody data-catalog-body></tbody>
              </table>
            </div>
            <div class="catalog-empty hidden" data-catalog-empty><p>No se encontraron roles.</p></div>
            <div class="catalog-pagination" data-catalog-pagination></div>
          </div>

          <!-- Panel Permisos -->
          <div data-panel="permisos" data-catalog="permisos" class="hidden">
            <div class="catalog-query">
              <div class="catalog-field catalog-field-grow">
                <label for="search-permisos">Buscar</label>
                <input id="search-permisos" type="search" data-catalog-search class="catalog-input" placeholder="Buscar permiso…" />
              </div>
              <div class="catalog-field">
                <label for="filter-modulo">Módulo</label>
                <select id="filter-modulo" data-filter="modulo" class="catalog-select min-w-[11rem]">
                  <option value="">Todos</option>
                  <option value="catalogos">Catálogos</option>
                  <option value="tutoria">Tutoría</option>
                  <option value="fichas">Fichas</option>
                  <option value="alertas">Alertas / derivación</option>
                </select>
              </div>
              <div class="catalog-query-actions">
                <button type="button" data-catalog-search-btn class="btn-secondary btn-icon" title="Buscar" aria-label="Buscar">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
                </button>
                <button type="button" data-catalog-clear class="btn-ghost btn-icon" title="Limpiar" aria-label="Limpiar">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
                </button>
              </div>
            </div>
            <div class="catalog-meta" data-catalog-meta></div>
            <div class="catalog-table-wrap" data-catalog-table-wrap>
              <table class="catalog-table">
                <thead data-catalog-thead></thead>
                <tbody data-catalog-body></tbody>
              </table>
            </div>
            <div class="catalog-empty hidden" data-catalog-empty><p>No se encontraron permisos.</p></div>
            <div class="catalog-pagination" data-catalog-pagination></div>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal Rol (+ checklist permisos) -->
    <div data-rol-backdrop class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
      <div class="modal-panel max-w-lg">
        <h2 data-rol-title class="font-heading">Nuevo rol</h2>
        <form data-rol-form class="mt-4 space-y-4" novalidate>
          <input type="hidden" data-rol-editing-id />
          <div>
            <label for="rol-nombre" class="form-label">Nombre del rol</label>
            <input id="rol-nombre" type="text" required class="form-input" placeholder="Ej. Docente-Tutor" />
          </div>
          <div>
            <label for="rol-ambito" class="form-label">Ámbito</label>
            <select id="rol-ambito" class="form-input">
              <option value="interno">Interno</option>
              <option value="receptor">Entidad receptora</option>
            </select>
          </div>
          <fieldset>
            <legend class="form-label">Permisos asignados</legend>
            <p class="form-hint mb-2">Marque los permisos de este rol (RolPermiso).</p>
            <div data-permisos-checklist class="max-h-48 space-y-2 overflow-y-auto rounded-md border border-border bg-bg p-3"></div>
          </fieldset>
          <div class="mt-6 flex justify-end gap-3">
            <button type="button" data-rol-cancel class="btn-secondary">Cancelar</button>
            <button type="submit" class="btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal Permiso -->
    <div data-permiso-backdrop class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
      <div class="modal-panel">
        <h2 data-permiso-title class="font-heading">Nuevo permiso</h2>
        <form data-permiso-form class="mt-4 space-y-4" novalidate>
          <input type="hidden" data-permiso-editing-id />
          <div>
            <label for="permiso-nombre" class="form-label">Nombre</label>
            <input id="permiso-nombre" type="text" required class="form-input" placeholder="Ej. ver_alertas" />
          </div>
          <div>
            <label for="permiso-modulo" class="form-label">Módulo</label>
            <select id="permiso-modulo" class="form-input">
              <option value="catalogos">Catálogos</option>
              <option value="tutoria">Tutoría</option>
              <option value="fichas">Fichas</option>
              <option value="alertas">Alertas / derivación</option>
            </select>
          </div>
          <div class="mt-6 flex justify-end gap-3">
            <button type="button" data-permiso-cancel class="btn-secondary">Cancelar</button>
            <button type="submit" class="btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <app-modal-confirm></app-modal-confirm>
    <app-toast></app-toast>
    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-modal-confirm.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/catalog-table.js"></script>
    <script src="../../js/roles-permisos.js"></script>
  </body>
</html>
