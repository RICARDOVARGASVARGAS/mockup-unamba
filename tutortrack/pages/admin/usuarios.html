<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Usuarios"
        user-name="Ricardo Vargas Vargas"
        user-role="Administrador"
        user-initials="RV"
        user-avatar="assets/img/admin/ricardo-vargas.jpg"
      ></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <section class="app-card catalog-panel" data-catalog data-audit-table="usuario" data-delete-toast="Usuario eliminado">
          <div class="catalog-head">
            <div>
              <h2 class="font-heading">Usuarios del sistema</h2>
              <p>Admins, coordinadores y receptores. Docentes y estudiantes se gestionan en sus propias secciones.</p>
            </div>
            <div class="catalog-head-actions">
              <button type="button" data-catalog-refresh class="btn-secondary">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
                </svg>
                Actualizar lista
              </button>
              <button type="button" data-open-create class="btn-primary">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Nuevo usuario
              </button>
            </div>
          </div>

          <div class="catalog-query">
            <div class="catalog-field catalog-field-grow">
              <label for="catalog-search">Buscar</label>
              <input
                id="catalog-search"
                type="search"
                data-catalog-search
                class="catalog-input"
                placeholder="Buscar por nombre, documento o correo…"
              />
            </div>
            <div class="catalog-field">
              <label for="filter-estado">Estado</label>
              <select id="filter-estado" data-filter="estado" class="catalog-select min-w-[10rem]">
                <option value="">Todos</option>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>
            <div class="catalog-query-actions">
              <button type="button" data-catalog-search-btn class="btn-secondary btn-icon" title="Buscar" aria-label="Buscar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
              </button>
              <button type="button" data-catalog-clear class="btn-ghost btn-icon" title="Limpiar" aria-label="Limpiar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>

          <div class="catalog-meta" data-catalog-meta></div>
          <div class="catalog-table-wrap" data-catalog-table-wrap>
            <table class="catalog-table">
              <thead data-catalog-thead></thead>
              <tbody data-catalog-body></tbody>
            </table>
          </div>
          <div class="catalog-empty hidden" data-catalog-empty>
            <p>No se encontraron usuarios con esos criterios.</p>
          </div>
          <div class="catalog-pagination" data-catalog-pagination></div>
        </section>
      </main>
    </div>

    <app-modal-confirm></app-modal-confirm>
    <app-modal-historial></app-modal-historial>
    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-modal-confirm.js"></script>
    <script src="../../js/auditoria-data.js"></script>
    <script src="../../components/app-modal-historial.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/catalog-table.js"></script>
    <script src="../../js/tipos-documento-data.js"></script>
    <script src="../../js/usuarios-data.js"></script>
    <script src="../../js/usuarios.js"></script>
  </body>
</html>
