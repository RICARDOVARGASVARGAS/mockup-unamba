<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Derivaciones (supervisión) | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Derivaciones"
        user-name="Ricardo Vargas"
        user-role="Administrador"
        user-initials="RV"
        user-avatar="assets/img/docentes/docente-1.jpg"
      ></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-4">
        <section data-vista="lista" class="space-y-4">
          <div>
            <h2 class="font-heading text-xl font-bold text-text">Derivaciones (supervisión)</h2>
            <p class="text-sm text-text-muted">Solo lectura. Quien mueve el estado es el receptor de la entidad.</p>
          </div>

          <div class="flex flex-wrap items-end gap-2">
            <div class="catalog-field min-w-[9rem]">
              <label for="filtro-entidad" class="form-label">Entidad</label>
              <select id="filtro-entidad" class="catalog-select">
                <option value="">Todas</option>
              </select>
            </div>
            <div class="catalog-field min-w-[9rem]">
              <label for="filtro-docente" class="form-label">Docente</label>
              <select id="filtro-docente" class="catalog-select">
                <option value="">Todos</option>
                <option value="doc-1">Dr. Quispe</option>
                <option value="doc-2">Mg. Torres</option>
              </select>
            </div>
            <div class="catalog-field min-w-[10rem]">
              <label for="filtro-estado" class="form-label">Estado</label>
              <select id="filtro-estado" class="catalog-select">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="catalog-field">
              <label for="filtro-desde" class="form-label">Desde</label>
              <input id="filtro-desde" type="date" class="form-input" />
            </div>
            <div class="catalog-field">
              <label for="filtro-hasta" class="form-label">Hasta</label>
              <input id="filtro-hasta" type="date" class="form-input" />
            </div>
            <div class="catalog-field min-w-[11rem] flex-1">
              <label for="filtro-q" class="form-label">Buscar</label>
              <input id="filtro-q" type="search" class="form-input" placeholder="Estudiante…" />
            </div>
            <button type="button" id="btn-limpiar" class="btn-ghost" data-catalog-clear aria-label="Limpiar">✕</button>
          </div>

          <div class="app-card overflow-x-auto p-0">
            <table class="catalog-table">
              <thead>
                <tr>
                  <th class="text-center w-12">N°</th>
                  <th>Estudiante</th>
                  <th>Entidad</th>
                  <th>Docente</th>
                  <th>Estado actual</th>
                  <th>Creada</th>
                  <th class="text-right"> </th>
                </tr>
              </thead>
              <tbody data-tbody></tbody>
            </table>
            <p data-vacio class="hidden px-6 py-10 text-center text-sm text-text-muted">Sin derivaciones.</p>
          </div>
        </section>

        <section data-vista="detalle" class="hidden space-y-4">
          <button type="button" id="btn-volver" class="btn-ghost btn-sm">← Derivaciones</button>
          <div class="app-card space-y-4 p-5">
            <div>
              <h2 class="font-heading text-xl font-bold" data-det-titulo>—</h2>
              <p class="mt-1 text-sm text-text-muted">Estado: <span data-det-estado class="font-semibold text-text">—</span></p>
            </div>
            <div>
              <h3 class="text-sm font-semibold">Motivo</h3>
              <p class="mt-1 text-sm text-text" data-det-motivo>—</p>
            </div>
            <div class="flex flex-wrap gap-2 text-sm" data-det-origen></div>
            <div>
              <h3 class="text-sm font-semibold mb-2">Línea de tiempo</h3>
              <ul class="timeline-list" data-det-timeline></ul>
            </div>
            <div data-det-visibilidad></div>
            <p class="text-xs text-text-muted">Supervisión — sin cambiar estado ni visibilidad.</p>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal no usado en admin, pero derivaciones.js lo espera de forma segura -->
    <div id="modal-derivar-backdrop" class="hidden"></div>
    <form id="form-derivar" class="hidden">
      <input id="der-alerta-id" />
      <select id="der-estudiante"></select>
      <select id="der-entidad"></select>
      <textarea id="der-motivo"></textarea>
      <div data-alerta-origen></div>
    </form>

    <app-toast></app-toast>

    <script>
      window.DERIVACIONES_PAGE_MODE = "admin";
    </script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/fichas-data.js"></script>
    <script src="../../js/fichas-ciclo-data.js"></script>
    <script src="../../js/entidades-receptoras-data.js"></script>
    <script src="../../js/alertas-derivaciones-data.js"></script>
    <script src="../../js/derivaciones.js"></script>
  </body>
</html>
