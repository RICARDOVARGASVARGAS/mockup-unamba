<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Docente-Tutor | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Dashboard"
        user-name="Carlos Quispe Mamani"
        user-role="Docente-Tutor"
        user-initials="CQ"
        user-avatar="assets/img/docentes/docente-1.jpg"
      ></app-topbar>

      <main class="flex-1 space-y-6 p-4 sm:p-6 lg:p-8">
        <h2 class="font-heading text-xl font-bold text-text">Dashboard · Docente-Tutor</h2>

        <section aria-label="KPIs" class="stat-strip">
          <div class="stat-strip-item" data-tone="primary">
            <span class="stat-strip-value" data-kpi-tutorados>0</span>
            <span class="stat-strip-label">Tutorados</span>
          </div>
          <div class="stat-strip-item" data-tone="warning">
            <span class="stat-strip-value" data-kpi-por-rev>0</span>
            <span class="stat-strip-label">Fichas por rev.</span>
          </div>
          <div class="stat-strip-item" data-tone="danger">
            <span class="stat-strip-value" data-kpi-alertas>0</span>
            <span class="stat-strip-label">Alertas</span>
          </div>
          <div class="stat-strip-item">
            <span class="stat-strip-value" data-kpi-deriv>0</span>
            <span class="stat-strip-label">Derivaciones</span>
          </div>
        </section>

        <section class="grid grid-cols-1 gap-4 lg:grid-cols-2">
          <div class="app-card p-5">
            <h3 class="section-title">Por revisar</h3>
            <ul class="mt-3 space-y-2" data-lista-por-revisar></ul>
            <a href="fichas-tutorados.html" class="section-link mt-3 inline-block">Ir a revisar</a>
          </div>
          <div class="app-card p-5">
            <h3 class="section-title">Alertas recientes</h3>
            <ul class="mt-3 space-y-2" data-lista-alertas></ul>
            <a href="alertas.html" class="section-link mt-3 inline-block">Ver alertas</a>
          </div>
          <div class="app-card p-5 lg:col-span-2">
            <h3 class="section-title">Avance de mis tutorados</h3>
            <div class="mt-3 h-2.5 overflow-hidden rounded-full bg-border">
              <div class="h-full rounded-full bg-primary" data-avance-bar style="width: 70%"></div>
            </div>
            <p class="mt-2 text-sm text-text-muted" data-avance-label>—</p>
          </div>
        </section>
      </main>
    </div>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../js/fichas-data.js"></script>
    <script src="../../js/fichas-ciclo-data.js"></script>
    <script src="../../js/entidades-receptoras-data.js"></script>
    <script src="../../js/alertas-derivaciones-data.js"></script>
    <script src="../../js/dashboard-docente.js"></script>
  </body>
</html>
