<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Respuestas de ficha | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar page-title="Respuestas de ficha" user-name="Mg. Hugo Vargas H." user-role="Docente-Tutor" user-initials="HV" user-avatar="assets/img/admin/ricardo-vargas.jpg"></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-5">

        <!-- Breadcrumb -->
        <nav class="flex items-center gap-2 text-sm text-text-muted">
          <a id="link-fichas" href="fichas-tutorados.html" class="hover:text-primary">Fichas de tutorados</a>
          <span>›</span>
          <span id="bc-nombre" class="text-text font-medium">Estudiante</span>
        </nav>

        <!-- Encabezado del estudiante -->
        <div class="app-card p-5 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div class="flex items-center gap-4">
            <div id="est-avatar" class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-primary/10 text-primary font-bold text-lg"></div>
            <div>
              <h2 id="est-nombre" class="font-heading text-lg font-bold text-text"></h2>
              <div id="est-meta" class="mt-0.5 text-sm text-text-muted"></div>
              <div id="ficha-nombre" class="mt-1 text-sm font-medium text-text"></div>
            </div>
          </div>
          <div id="revisada-badge" class="hidden">
            <span class="badge badge-success">Revisada</span>
          </div>
        </div>

        <!-- Lista de preguntas y respuestas -->
        <div id="preguntas-container" class="space-y-4"></div>

        <!-- Botón final -->
        <div class="sticky bottom-0 z-10 -mx-4 border-t border-border bg-bg/95 px-4 py-3 backdrop-blur sm:-mx-0 sm:rounded-lg sm:border sm:px-5">
          <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
            <a id="link-volver" href="fichas-tutorados.html" class="btn-secondary inline-flex justify-center">Volver</a>
            <button type="button" id="btn-marcar-revisada" class="btn-primary">Marcar como revisada</button>
          </div>
        </div>

      </main>
    </div>

    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/ficha-respuestas-data.js"></script>
    <script src="../../js/ficha-respuestas.js"></script>
  </body>
</html>
