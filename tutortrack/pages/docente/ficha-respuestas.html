<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ver respuestas | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Ver respuestas"
        user-name="Carlos Quispe Mamani"
        user-role="Docente-Tutor"
        user-initials="CQ"
        user-avatar="assets/img/docentes/docente-1.jpg"
      ></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="mx-auto w-full max-w-3xl space-y-5">
          <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
              <a href="fichas-tutorados.html" class="text-sm font-medium text-primary hover:underline">← Mis tutorados</a>
              <h2 data-ficha-nombre class="mt-1 font-heading text-xl font-bold text-text">Ficha</h2>
              <p data-meta class="mt-1 text-sm text-text-muted"></p>
            </div>
            <button type="button" data-btn-revisada class="btn-primary shrink-0 sticky top-20 z-10 shadow-md">
              ✓ Marcar revisada
            </button>
          </div>

          <div data-respuestas class="space-y-4"></div>
        </div>
      </main>
    </div>

    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/fichas-data.js"></script>
    <script src="../../js/fichas-ciclo-data.js"></script>
    <script src="../../js/ficha-respuestas.js"></script>
  </body>
</html>
