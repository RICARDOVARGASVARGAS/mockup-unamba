<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fichas de tutorados | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar page-title="Fichas de mis tutorados" user-name="Mg. Hugo Vargas H." user-role="Docente-Tutor" user-initials="HV" user-avatar="assets/img/admin/ricardo-vargas.jpg"></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-5">

        <!-- Encabezado con selector de ficha -->
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h2 class="font-heading text-xl font-bold text-text">Fichas de mis tutorados</h2>
            <p class="mt-0.5 text-sm text-text-muted">1° Ciclo · 2026-I · 16 tutorados</p>
          </div>
          <div class="flex items-center gap-2">
            <label for="sel-ficha" class="text-sm font-medium text-text-muted shrink-0">Ficha:</label>
            <select id="sel-ficha" class="form-input max-w-xs"></select>
          </div>
        </div>

        <!-- Resumen de estado -->
        <div id="resumen-bar" class="app-card p-4 flex flex-wrap gap-4 text-sm"></div>

        <!-- Tabla de tutorados -->
        <section class="app-card">
          <div class="catalog-table-wrap">
            <table class="catalog-table">
              <thead>
                <tr>
                  <th class="text-left">Estudiante</th>
                  <th class="text-center">Estado</th>
                  <th class="text-center">Fecha envío</th>
                  <th class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tutorados-tbody"></tbody>
            </table>
          </div>
        </section>

      </main>
    </div>

    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/fichas-tutorados-data.js"></script>
    <script src="../../js/fichas-tutorados.js"></script>
  </body>
</html>
