<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fichas de mis tutorados | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Fichas de mis tutorados"
        user-name="Carlos Quispe Mamani"
        user-role="Docente-Tutor"
        user-initials="CQ"
        user-avatar="assets/img/docentes/docente-1.jpg"
      ></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-4">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h2 class="font-heading text-xl font-bold text-text">Fichas de mis tutorados</h2>
            <p class="text-sm text-text-muted" data-contexto>2026-I · Quinto ciclo</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <select id="sel-ciclo" class="catalog-select min-w-[10rem]" aria-label="Ciclo">
              <option value="ciclo-5">Quinto ciclo</option>
            </select>
            <select id="sel-vista" class="catalog-select min-w-[9rem]" aria-label="Vista">
              <option value="matriz">Matriz</option>
              <option value="ficha">Por ficha</option>
              <option value="estudiante">Por estudiante</option>
            </select>
            <span data-por-revisar class="inline-flex items-center gap-1.5 rounded-full bg-danger/10 px-3 py-1 text-sm font-medium text-danger">
              🔴 <span data-por-revisar-n>0</span> por revisar
            </span>
          </div>
        </div>

        <div data-vista-matriz class="app-card overflow-x-auto p-4">
          <table class="catalog-table text-sm" data-matriz-table>
            <thead data-matriz-head></thead>
            <tbody data-matriz-body></tbody>
          </table>
          <p class="mt-3 text-xs text-text-muted">
            Leyenda: ✓ revisada · ● enviada (por revisar) · ◐ borrador · ○ sin abrir · 🔒 no habilitada
          </p>
        </div>

        <div data-vista-ficha class="hidden space-y-4">
          <div class="catalog-field max-w-sm">
            <label for="sel-ficha" class="form-label">Ficha</label>
            <select id="sel-ficha" class="form-input"></select>
          </div>
          <div class="app-card overflow-x-auto p-4">
            <table class="catalog-table">
              <thead>
                <tr>
                  <th>Estudiante</th>
                  <th>Código</th>
                  <th>Estado</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-por-ficha-body></tbody>
            </table>
          </div>
        </div>

        <div data-vista-estudiante class="hidden space-y-4">
          <div class="catalog-field max-w-sm">
            <label for="sel-est" class="form-label">Estudiante</label>
            <select id="sel-est" class="form-input"></select>
          </div>
          <div class="app-card overflow-x-auto p-4">
            <table class="catalog-table">
              <thead>
                <tr>
                  <th>Ficha</th>
                  <th>Estado</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-por-est-body></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/fichas-data.js"></script>
    <script src="../../js/fichas-ciclo-data.js"></script>
    <script src="../../js/fichas-tutorados.js"></script>
  </body>
</html>
