<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Receptor | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Dashboard"
        user-name="Rosa Medina Ccahua"
        user-role="Receptor · Psicología"
        user-initials="RM"
        user-avatar="assets/img/avatares/usuario-f.svg"
      ></app-topbar>

      <main class="flex-1 space-y-6 p-4 sm:p-6 lg:p-8">
        <h2 class="font-heading text-xl font-bold text-text">
          Dashboard · <span data-entidad>Psicología</span>
        </h2>

        <section aria-label="KPIs" class="stat-strip">
          <div class="stat-strip-item" data-tone="danger">
            <span class="stat-strip-value" data-kpi-nuevos>0</span>
            <span class="stat-strip-label">Nuevos</span>
          </div>
          <div class="stat-strip-item" data-tone="warning">
            <span class="stat-strip-value" data-kpi-proceso>0</span>
            <span class="stat-strip-label">En proceso</span>
          </div>
          <div class="stat-strip-item" data-tone="success">
            <span class="stat-strip-value" data-kpi-resueltos>0</span>
            <span class="stat-strip-label">Resueltos (mes)</span>
          </div>
          <div class="stat-strip-item">
            <span class="stat-strip-value" data-kpi-activos>0</span>
            <span class="stat-strip-label">Activos total</span>
          </div>
        </section>

        <section class="grid grid-cols-1 gap-4 lg:grid-cols-2">
          <div class="app-card p-5">
            <h3 class="section-title">Nuevos por atender</h3>
            <ul class="mt-3 space-y-2" data-lista-nuevos></ul>
            <a href="casos.html" class="section-link mt-3 inline-block">Ir a casos</a>
          </div>
          <div class="app-card p-5">
            <h3 class="section-title">⚠ Casos estancados</h3>
            <ul class="mt-3 space-y-2" data-lista-estancados></ul>
            <a href="casos.html" class="section-link mt-3 inline-block">Revisar</a>
          </div>
        </section>
      </main>
    </div>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../js/entidades-receptoras-data.js"></script>
    <script src="../../js/alertas-derivaciones-data.js"></script>
    <script src="../../js/dashboard-receptor.js"></script>
  </body>
</html>
