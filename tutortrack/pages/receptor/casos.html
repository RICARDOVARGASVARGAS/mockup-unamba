<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casos derivados | TutorTrack (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/tailwind-config.js"></script>
  </head>
  <body class="w-full bg-bg text-text font-body antialiased">
    <app-sidebar></app-sidebar>
    <div class="app-canvas flex min-h-screen flex-col lg:pl-72">
      <app-topbar
        page-title="Casos derivados"
        user-name="Rosa Medina Ccahua"
        user-role="Receptor · Psicología"
        user-initials="RM"
        user-avatar="assets/img/avatares/usuario-f.svg"
      ></app-topbar>

      <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-4">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h2 class="font-heading text-xl font-bold text-text">
              Casos derivados · <span data-entidad-nombre>Psicología</span>
            </h2>
            <p class="text-sm text-text-muted">Tú mueves el estado del pipeline. Solo ves casos de tu entidad.</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <div class="vista-toggle" role="group" aria-label="Vista">
              <button type="button" data-vista-btn="kanban" class="is-active" aria-pressed="true">Kanban</button>
              <button type="button" data-vista-btn="lista" aria-pressed="false">Lista</button>
            </div>
            <span class="inline-flex items-center gap-1.5 rounded-full bg-danger/10 px-3 py-1.5 text-sm font-medium text-danger">
              🔴 <span data-nuevos-n>0</span> nuevos
            </span>
            <input id="filtro-q" type="search" class="form-input w-44" placeholder="Buscar…" aria-label="Buscar" />
          </div>
        </div>

        <div data-vista-kanban class="kanban-board" aria-label="Pipeline de casos"></div>

        <div data-vista-lista class="hidden app-card overflow-x-auto p-0">
          <table class="catalog-table">
            <thead>
              <tr>
                <th>Estudiante</th>
                <th>Docente</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th class="text-right">Acciones</th>
              </tr>
            </thead>
            <tbody data-lista-body></tbody>
          </table>
          <p data-lista-vacio class="hidden px-6 py-10 text-center text-sm text-text-muted">Sin casos en tu entidad.</p>
        </div>
      </main>
    </div>

    <!-- Drawer atender -->
    <div id="drawer-caso-backdrop" class="app-drawer-backdrop hidden" aria-hidden="true"></div>
    <aside id="drawer-caso" class="app-drawer" style="width: min(32rem, 100vw)" role="dialog" aria-modal="true" aria-labelledby="drawer-caso-title" hidden>
      <div class="app-drawer-head">
        <div class="min-w-0">
          <h2 id="drawer-caso-title" class="font-heading text-lg font-semibold truncate">Caso</h2>
          <p data-drawer-sub class="mt-0.5 text-sm text-text-muted truncate"></p>
        </div>
        <button type="button" id="btn-drawer-cerrar" class="btn-ghost btn-icon shrink-0" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="app-drawer-body space-y-4" data-drawer-body></div>
      <div class="app-drawer-foot space-y-3" data-drawer-foot></div>
    </aside>

    <!-- Mini prompt nota (drag o cambio) -->
    <div id="modal-nota-backdrop" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/50 p-4">
      <div class="modal-panel w-full max-w-md" role="dialog" aria-modal="true" aria-labelledby="modal-nota-title">
        <h2 id="modal-nota-title" class="font-heading text-lg font-bold">Cambiar estado</h2>
        <p class="mt-1 text-sm text-text-muted" data-nota-destino></p>
        <div class="mt-3 catalog-field">
          <label for="nota-texto" class="form-label">Nota</label>
          <textarea id="nota-texto" class="form-input min-h-[4.5rem]" placeholder="Observación sobre este cambio…"></textarea>
        </div>
        <div class="mt-4 flex justify-end gap-2">
          <button type="button" id="btn-nota-cancelar" class="btn-secondary">Cancelar</button>
          <button type="button" id="btn-nota-guardar" class="btn-primary">Guardar</button>
        </div>
      </div>
    </div>

    <app-toast></app-toast>

    <script src="../../js/theme.js"></script>
    <script src="../../js/site-paths.js"></script>
    <script src="../../components/app-sidebar.js"></script>
    <script src="../../components/app-topbar.js"></script>
    <script src="../../components/app-toast.js"></script>
    <script src="../../js/fichas-data.js"></script>
    <script src="../../js/fichas-ciclo-data.js"></script>
    <script src="../../js/entidades-receptoras-data.js"></script>
    <script src="../../js/alertas-derivaciones-data.js"></script>
    <script src="../../js/casos.js"></script>
  </body>
</html>
